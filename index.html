<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recombinant Antibody Registry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container-fluid px-5 my-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-dark m-0">Recombinant Antibody Registry</h1>
            <a href="./submit.html" class="btn btn-primary d-flex align-items-center gap-2 shadow-sm">
                ➕ Submit New Antibody
            </a>
        </div>

        <div class="card shadow-sm border-0 p-4 mb-4 bg-white">
            <div class="row g-3">
                <div class="col-md-5">
                    <label class="form-label fw-semibold text-secondary small">Search Keywords</label>
                    <input type="text" id="searchBar" class="form-control" placeholder="Search by name, biomarker, UniProt, catalog #, or RRID..." oninput="filterDatabase()">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold text-secondary small">Filter by Vendor</label>
                    <select id="vendorFilter" class="form-select" onchange="filterDatabase()">
                        <option value="">All Vendors</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold text-secondary small">Filter by Validation Assay</label>
                    <select id="assayFilter" class="form-select" onchange="filterDatabase()">
                        <option value="">All Assays (IHC, WB, ICC, etc.)</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Antibody Name</th>
                            <th>Target Biomarker</th>
                            <th>UniProt ID</th>
                            <th>Host & Isotype</th>
                            <th>Format</th>
                            <th>Vendor</th>
                            <th>Catalog Number</th>
                            <th>RRID</th>
                            <th>Assay Validation Records</th>
                        </tr>
                    </thead>
                    <tbody id="databaseBody">
                        <tr>
                            <td colspan="9" class="text-center py-5 text-muted">
                                <div class="spinner-border text-secondary mb-2" role="status"></div>
                                <br>Loading registry entries...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Global runtime application state scopes
        let rawAntibodyDataset = [];

        // Fetch compiled centralized database file
        async function loadDatabase() {
            try {
                const response = await fetch('./database.json');
                rawAntibodyDataset = await response.json();
                
                // Extract parameters to dynamically populate search selector modules
                populateFilterOptions(rawAntibodyDataset);
                
                // Initial render pass
                renderTable(rawAntibodyDataset);
            } catch (error) {
                document.getElementById('databaseBody').innerHTML = 
                    `<tr><td colspan="9" class="text-center text-danger py-4">Error loading data. Verify that database.json has been compiled successfully.</td></tr>`;
            }
        }

        // Dynamically inspects records to populate dropdown selections based on live data values
        function populateFilterOptions(data) {
            const vendorSelect = document.getElementById('vendorFilter');
            const assaySelect = document.getElementById('assayFilter');
            
            const uniqueVendors = new Set();
            const uniqueAssays = new Set();

            data.forEach(ab => {
                if (ab.vendor) uniqueVendors.add(ab.vendor.trim());

                // Parse modern nested validation structures
                if (ab.validations && Array.isArray(ab.validations)) {
                    ab.validations.forEach(v => {
                        if (v.application) {
                            // Split comma separated listings like "IHC, Western Blot" into single terms
                            v.application.split(',').forEach(item => uniqueAssays.add(item.trim()));
                        }
                    });
                }
                // Parse legacy fallback validation lists
                if (ab.validated_in_these_applications && Array.isArray(ab.validated_in_these_applications)) {
                    ab.validated_in_these_applications.forEach(item => uniqueAssays.add(item.trim()));
                }
            });

            // Append sorted values into selectors
            Array.from(uniqueVendors).sort().forEach(vendor => {
                vendorSelect.options[vendorSelect.options.length] = new Option(vendor, vendor);
            });
            Array.from(uniqueAssays).sort().forEach(assay => {
                assaySelect.options[assaySelect.options.length] = new Option(assay, assay);
            });
        }

        // Filters matching array metrics inside user interface state
        function filterDatabase() {
            const searchQuery = document.getElementById('searchBar').value.toLowerCase().trim();
            const selectedVendor = document.getElementById('vendorFilter').value;
            const selectedAssay = document.getElementById('assayFilter').value;

            const filteredData = rawAntibodyDataset.filter(ab => {
                // 1. Calculate Keyword String Matches across key fields
                const matchKeyword = 
                    (ab.antibody_name && ab.antibody_name.toLowerCase().includes(searchQuery)) ||
                    (ab.target_name_protein_biomarker && ab.target_name_protein_biomarker.toLowerCase().includes(searchQuery)) ||
                    (ab.uniprot_accession_number && ab.uniprot_accession_number.toLowerCase().includes(searchQuery)) ||
                    (ab.catalog_number && ab.catalog_number.toLowerCase().includes(searchQuery)) ||
                    (ab.rrid && ab.rrid.toLowerCase().includes(searchQuery));

                // 2. Calculate explicit dropdown matches
                const matchVendor = !selectedVendor || ab.vendor === selectedVendor;
                
                // 3. Inspect both nested and legacy arrays for matching assay selection
                let matchAssay = !selectedAssay;
                if (selectedAssay) {
                    if (ab.validations && Array.isArray(ab.validations)) {
                        matchAssay = ab.validations.some(v => v.application && v.application.includes(selectedAssay));
                    }
                    if (!matchAssay && ab.validated_in_these_applications && Array.isArray(ab.validated_in_these_applications)) {
                        matchAssay = ab.validated_in_these_applications.includes(selectedAssay);
                    }
                }

                return matchKeyword && matchVendor && matchAssay;
            });

            renderTable(filteredData);
        }

        // Maps data arrays into semantic structural layout rows
        function renderTable(data) {
            const tbody = document.getElementById('databaseBody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center py-4 text-muted">No records matching your search settings were found.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(ab => `
                <tr>
                    <td><strong>${ab.antibody_name}</strong></td>
                    <td>
                        ${ab.target_name_protein_biomarker}
                        ${ab.ag_notes_epitope_or_modified_forms ? `<br><small class="text-muted">(${ab.ag_notes_epitope_or_modified_forms})</small>` : ''}
                    </td>
                    <td>
                        <a href="${ab.uniprot_link}" target="_blank" class="text-decoration-none fw-semibold">${ab.uniprot_accession_number}</a>
                    </td>
                    <td>${ab.host_organism_and_isotype || 'N/A'}</td>
                    <td><span class="badge bg-light text-dark border">${ab.format_recombinant_monoclonal || 'Recombinant'}</span></td>
                    <td>${ab.vendor}</td>
                    <td>
                        <a href="${ab.catalog_link}" target="_blank" class="text-decoration-none fw-semibold">#${ab.catalog_number}</a>
                    </td>
                    <td>
                        <a href="https://scicrunch.org/resources/Any/search?q=${ab.rrid}" target="_blank" class="badge bg-secondary text-decoration-none">${ab.rrid}</a>
                    </td>
                    <td>
                        <div class="d-flex flex-column gap-2" style="min-width: 280px;">
                            
                            ${ab.validations && Array.isArray(ab.validations) ? 
                                ab.validations.map(v => `
                                    <div class="p-2 rounded bg-white border border-light shadow-sm">
                                        <div class="d-flex justify-content-between align-items-center mb-1">
                                            <span class="badge bg-primary">${v.application}</span>
                                            <a href="${v.link}" target="_blank" class="text-decoration-none fw-semibold small">🔗 View Assay Data</a>
                                        </div>
                                        ${v.notes ? `<small class="text-muted d-block lh-sm">${v.notes}</small>` : ''}
                                    </div>
                                `).join('') 
                            : ''}

                            ${ab.validated_in_these_applications && Array.isArray(ab.validated_in_these_applications) && !ab.validations ? 
                                ab.validated_in_these_applications.map(app => `
                                    <div class="p-2 rounded bg-white border border-light shadow-sm">
                                        <div class="d-flex justify-content-between align-items-center mb-1">
                                            <span class="badge bg-secondary">${app}</span>
                                            ${ab.validation_data_link ? `<a href="${ab.validation_data_link}" target="_blank" class="text-decoration-none fw-semibold small">🔗 View Source Link</a>` : ''}
                                        </div>
                                        ${ab.validation_notes ? `<small class="text-muted d-block lh-sm">${ab.validation_notes} <span class="fst-italic">(Verified by: ${ab.validated_by || 'Unknown'})</span></small>` : ''}
                                    </div>
                                `).join('')
                            : ''}

                            ${(!ab.validations && !ab.validated_in_these_applications) ? '<span class="text-muted small italic">No records provided</span>' : ''}
                            
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Initialize engine on initial document parsing complete
        loadDatabase();
    </script>
</body>
</html>
