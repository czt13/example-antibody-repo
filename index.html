<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recombinant Antibody Registry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container-fluid px-5 my-5">
        <h1 class="mb-4 text-center text-dark">Recombinant Antibody Registry</h1>
        
        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Antibody Name</th>
                            <th>Target Biomarker</th>
                            <th>UniProt ID</th>
                            <th>Host & Isotype</th>
                            <th>Format</th>
                            <th>Vendor</th>
                            <th>Catalog Number</th>
                            <th>RRID</th>
                            <th>Validated Applications</th>
                            <th>Validation Summary</th>
                        </tr>
                    </thead>
                    <tbody id="databaseBody">
                        <tr>
                            <td colspan="10" class="text-center py-5 text-muted">
                                <div class="spinner-border text-secondary mb-2" role="status"></div>
                                <br>Loading registry entries...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Automatically fetch the centralized database compiled by GitHub Actions
        async function loadDatabase() {
            try {
                const response = await fetch('./database.json');
                const antibodies = await response.json();
                renderTable(antibodies);
            } catch (error) {
                document.getElementById('databaseBody').innerHTML = 
                    `<tr><td colspan="10" class="text-center text-danger py-4">Error loading data. Verify that database.json has been compiled successfully.</td></tr>`;
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('databaseBody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="text-center py-4 text-muted">No entries found in the database.</td></tr>`;
                return;
            }

            // Loop through all data objects and convert them into interactive table rows
            tbody.innerHTML = data.map(ab => `
                <tr>
                    <td><strong>${ab.antibody_name}</strong></td>
                    <td>
                        ${ab.target_name_protein_biomarker}
                        ${ab.ag_notes_epitope_or_modified_forms ? `<br><small class="text-muted">(${ab.ag_notes_epitope_or_modified_forms})</small>` : ''}
                    </td>
                    <td>
                        <a href="${ab.uniprot_link}" target="_blank" class="text-decoration-none fw-semibold">${ab.uniprot_accession_number}</a>
                    </td>
                    <td>${ab.host_organism_and_isotype}</td>
                    <td><span class="badge bg-light text-dark border">${ab.format_recombinant_monoclonal}</span></td>
                    <td>${ab.vendor}</td>
                    <td>
                        <a href="${ab.catalog_link}" target="_blank" class="text-decoration-none fw-semibold">#${ab.catalog_number}</a>
                    </td>
                    <td>
                        <a href="https://scicrunch.org/resources/Any/search?q=${ab.rrid}" target="_blank" class="badge bg-secondary text-decoration-none">${ab.rrid}</a>
                    </td>
                    <td>${(ab.validated_in_these_applications || []).join(', ')}</td>
                    <td>
                        <a href="${ab.validation_data_link}" target="_blank" class="text-decoration-none d-block small mb-1">🔗 View Validation Data</a>
                        <small class="text-muted d-block" style="max-width: 250px;">${ab.validation_notes} (Verified by: ${ab.validated_by})</small>
                    </td>
                </tr>
            `).join('');
        }

        // Initialize script on launch
        loadDatabase();
    </script>
</body>
</html>
