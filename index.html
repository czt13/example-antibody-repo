<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recombinant Antibody Registry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container-fluid px-5 my-5">
        <h1 class="mb-4 text-center text-dark">Recombinant Antibody Registry</h1>
        
        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Antibody Name</th>
                            <th>Target Biomarker</th>
                            <th>UniProt ID</th>
                            <th>Host & Isotype</th>
                            <th>Format</th>
                            <th>Vendor</th>
                            <th>Catalog Number</th>
                            <th>RRID</th>
                            <th>Assay Validation Records</th>
                        </tr>
                    </thead>
                    <tbody id="databaseBody">
                        <tr>
                            <td colspan="9" class="text-center py-5 text-muted">
                                <div class="spinner-border text-secondary mb-2" role="status"></div>
                                <br>Loading registry entries...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Fetch the compiled database file
        async function loadDatabase() {
            try {
                const response = await fetch('./database.json');
                const antibodies = await response.json();
                renderTable(antibodies);
            } catch (error) {
                document.getElementById('databaseBody').innerHTML = 
                    `<tr><td colspan="9" class="text-center text-danger py-4">Error loading data. Verify that database.json has been compiled successfully.</td></tr>`;
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('databaseBody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center py-4 text-muted">No entries found in the database.</td></tr>`;
                return;
            }

            // Map entries into safe table rows
            tbody.innerHTML = data.map(ab => `
                <tr>
                    <td><strong>${ab.antibody_name}</strong></td>
                    <td>
                        ${ab.target_name_protein_biomarker}
                        ${ab.ag_notes_epitope_or_modified_forms ? `<br><small class="text-muted">(${ab.ag_notes_epitope_or_modified_forms})</small>` : ''}
                    </td>
                    <td>
                        <a href="${ab.uniprot_link}" target="_blank" class="text-decoration-none fw-semibold">${ab.uniprot_accession_number}</a>
                    </td>
                    <td>${ab.host_organism_and_isotype || 'N/A'}</td>
                    <td><span class="badge bg-light text-dark border">${ab.format_recombinant_monoclonal || 'Recombinant'}</span></td>
                    <td>${ab.vendor}</td>
                    <td>
                        <a href="${ab.catalog_link}" target="_blank" class="text-decoration-none fw-semibold">#${ab.catalog_number}</a>
                    </td>
                    <td>
                        <a href="https://scicrunch.org/resources/Any/search?q=${ab.rrid}" target="_blank" class="badge bg-secondary text-decoration-none">${ab.rrid}</a>
                    </td>
                    <td>
                        <div class="d-flex flex-column gap-2" style="min-width: 280px;">
                            
                            ${ab.validations && Array.isArray(ab.validations) ? 
                                ab.validations.map(v => `
                                    <div class="p-2 rounded bg-white border border-light shadow-sm">
                                        <div class="d-flex justify-content-between align-items-center mb-1">
                                            <span class="badge bg-primary">${v.application}</span>
                                            <a href="${v.link}" target="_blank" class="text-decoration-none fw-semibold small">🔗 View Assay Data</a>
                                        </div>
                                        ${v.notes ? `<small class="text-muted d-block lh-sm">${v.notes}</small>` : ''}
                                    </div>
                                `).join('') 
                            : ''}

                            ${ab.validated_in_these_applications && Array.isArray(ab.validated_in_these_applications) && !ab.validations ? 
                                ab.validated_in_these_applications.map(app => `
                                    <div class="p-2 rounded bg-white border border-light shadow-sm">
                                        <div class="d-flex justify-content-between align-items-center mb-1">
                                            <span class="badge bg-secondary">${app}</span>
                                            ${ab.validation_data_link ? `<a href="${ab.validation_data_link}" target="_blank" class="text-decoration-none fw-semibold small">🔗 View Source Link</a>` : ''}
                                        </div>
                                        ${ab.validation_notes ? `<small class="text-muted d-block lh-sm">${ab.validation_notes} <span class="fst-italic">(Verified by: ${ab.validated_by || 'Unknown'})</span></small>` : ''}
                                    </div>
                                `).join('')
                            : ''}

                            ${(!ab.validations && !ab.validated_in_these_applications) ? '<span class="text-muted small italic">No records provided</span>' : ''}
                            
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Run on page boot
        loadDatabase();
    </script>
</body>
</html>
